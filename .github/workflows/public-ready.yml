name: Public Ready

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-ready:
    name: public-ready
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run private MVP gate
        shell: pwsh
        run: ./scripts/run_mvp_gate.ps1
