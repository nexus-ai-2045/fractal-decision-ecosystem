name: Public Ready

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-ready:
    name: public-ready
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Run public readiness check
        run: python scripts/public_ready_check.py

      - name: Install test dependencies
        run: python -m pip install pytest

      - name: Run tests
        run: python -m pytest -q
